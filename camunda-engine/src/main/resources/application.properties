spring.application.name=camunda-engine
server.port=8080

# Camunda Configuration
camunda.bpm.admin-user.id=admin
camunda.bpm.admin-user.password=admin
camunda.bpm.admin-user.first-name=Admin
camunda.bpm.admin-user.last-name=User

# Database Configuration (H2)
spring.datasource.url=jdbc:h2:mem:camunda;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Camunda Configuration
camunda.bpm.database.schema-update=true
camunda.bpm.auto-deployment-enabled=true
camunda.bpm.default-serialization-format=application/json

# JPA
spring.jpa.open-in-view=false

# Logging
logging.level.org.camunda=INFO
logging.level.com.charter.camunda=DEBUG
